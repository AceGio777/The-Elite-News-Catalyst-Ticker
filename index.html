<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Elite Terminal | Macro Edition</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root {
    --bg:#0e0e0f; --surface:#18181b; --border:#2a2a2e;
    --text:#f4f4f5; --muted:#71717a; --accent:#22d3ee;
    --green:#4ade80; --orange:#fb923c; --red:#f87171;
    --mono:'DM Mono',monospace; --syne:'Syne',sans-serif;
  }
  body{background:var(--bg); color:var(--text); font-family:var(--mono); padding:15px; min-height:100vh;}

  .header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
  .title { font-family: var(--syne); font-size: 18px; font-weight:700; }
  .subtitle { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }

  .feed-list { display: flex; flex-direction: column; gap: 12px; min-height: 400px; }
  
  .event-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px; position: relative; overflow: hidden; transition: 0.2s;
    animation: slideIn 0.3s ease-out;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .impact-strip { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
  .high { background: var(--red); box-shadow: 0 0 10px var(--red); }
  .med { background: var(--orange); }
  .low { background: var(--green); }

  .meta-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .time-box { font-size: 11px; font-weight: 500; color: var(--accent); }
  
  .event-title { font-size: 13px; line-height: 1.5; color: var(--text); margin-bottom: 8px; }
  
  .tag-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 700; background: var(--bg); border: 1px solid var(--border); }
  .tomorrow-tag { border-color: var(--accent); color: var(--accent); }
  .symbol-tag { border-color: var(--muted); color: var(--text); background: rgba(255,255,255,0.05); }
  .macro-tag { border-color: var(--red); color: var(--red); box-shadow: 0 0 5px rgba(248, 113, 113, 0.2); }

  /* Pagination */
  .pagination { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 25px; padding-top: 15px; border-top: 1px solid var(--border); }
  .nav-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; transition: 0.2s; }
  .nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .page-num { font-size: 11px; color: var(--muted); }
</style>
</head>
<body>

<div class="widget-container">
  <div class="header">
    <div>
      <span class="title">Market Terminal</span><br>
      <span class="subtitle">Macro News Engine</span>
    </div>
    <span id="tz-display" style="font-size: 10px; color: var(--muted);">EST</span>
  </div>

  <div id="feed" class="feed-list">
    <div style="text-align:center; padding:100px 0; color:var(--muted);">Parsing Global News...</div>
  </div>

  <div class="pagination">
    <button id="prevBtn" class="nav-btn" onclick="changePage(-1)">← Newer</button>
    <span id="pageNum" class="page-num">Page 1</span>
    <button id="nextBtn" class="nav-btn" onclick="changePage(1)">Older →</button>
  </div>
</div>

<script>
  // Advanced Macro Mapping
  const symbolMap = [
    { keys: /TRUMP|WHITE HOUSE|ADMINISTRATION|TARIFF|ELECTION|U.S. GOVT/i, tag: 'MACRO', type: 'macro' },
    { keys: /S&P 500|SPX|S&P|BROAD MARKET|INDEX/i, tag: 'SPX' },
    { keys: /DOW|FORD|BA|BOEING|INDUSTRIAL|BLUE CHIP/i, tag: 'DOW' },
    { keys: /NASDAQ|TECH|NVIDIA|AI|CHIP|SEMICONDUCTOR|MSFT|AAPL/i, tag: 'NAS' },
    { keys: /FED|FOMC|POWELL|RATE|CPI|INFLATION|USD|DOLLAR/i, tag: 'USD' },
    { keys: /GOLD|XAU|SILVER|METAL/i, tag: 'XAU' },
    { keys: /OIL|CRUDE|ENERGY|OPEC/i, tag: 'NRG' },
    { keys: /BTC|ETH|CRYPTO|BITCOIN/i, tag: 'CRY' }
  ];

  let allNews = [];
  let currentPage = 1;
  const itemsPerPage = 5;

  async function fetchNews() {
    try {
      const res = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.investing.com/rss/news_25.rss');
      const data = await res.json();
      if (data.status === 'ok') {
        allNews = data.items;
        renderPage();
      }
    } catch (e) {
      document.getElementById('feed').innerHTML = '<div style="text-align:center; padding:50px; color:var(--red);">Feed Offline</div>';
    }
  }

  function changePage(dir) {
    currentPage += dir;
    renderPage();
  }

  function renderPage() {
    const feed = document.getElementById('feed');
    const now = new Date();
    const tomorrow = new Date(); tomorrow.setDate(now.getDate() + 1);

    const start = (currentPage - 1) * itemsPerPage;
    const pagedItems = allNews.slice(start, start + itemsPerPage);

    document.getElementById('prevBtn').disabled = currentPage === 1;
    document.getElementById('nextBtn').disabled = start + itemsPerPage >= allNews.length;
    document.getElementById('pageNum').textContent = `Page ${currentPage}`;

    feed.innerHTML = pagedItems.map(item => {
      const d = new Date(item.pubDate);
      const title = item.title;
      const isTom = d.getDate() === tomorrow.getDate();
      
      let impact = 'low';
      if (/FED|FOMC|CPI|RATE|TRUMP|TARIFF|WAR|NFP/i.test(title)) impact = 'high';
      else if (/REPORT|INFLATION|JOBS|EARNINGS/i.test(title)) impact = 'med';

      let h = d.getHours();
      const m = String(d.getMinutes()).padStart(2,'0');
      const p = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;

      let tags = [];
      for (let s of symbolMap) { 
        if (s.keys.test(title)) {
            const cls = s.type === 'macro' ? 'tag macro-tag' : 'tag symbol-tag';
            tags.push(`<span class="${cls}">${s.tag}</span>`); 
        }
      }
      if (tags.length === 0) tags.push(`<span class="tag symbol-tag" style="opacity:0.5;">MKT</span>`);

      return `
        <div class="event-card">
          <div class="impact-strip ${impact}"></div>
          <div class="meta-row">
            <div class="time-box">${h}:${m} ${p}</div>
            <div class="tag-row">
              ${isTom ? '<span class="tag tomorrow-tag">TOMORROW</span>' : ''}
              ${tags.join('')}
            </div>
          </div>
          <div class="event-title">${title}</div>
        </div>
      `;
    }).join('');
  }

  fetchNews();
  setInterval(fetchNews, 600000);
</script>
</body>
</html>
