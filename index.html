<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Elite Market Ticker v7.4</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root {
    --bg:#0e0e0f; --surface:#18181b; --border:#2a2a2e;
    --text:#f4f4f5; --muted:#71717a; --accent:#22d3ee;
    --green:#4ade80; --orange:#fb923c; --red:#f87171;
    --mono:'DM Mono',monospace; --syne:'Syne',sans-serif;
  }
  body{background:var(--bg); color:var(--text); font-family:var(--mono); padding:10px; overflow:hidden;}

  .ticker-wrap {
    width: 100%; background: var(--surface); border: 1px solid var(--border); 
    border-radius: 12px; height: 54px; display: flex; align-items: center;
    position: relative; overflow: hidden;
  }

  /* Fixed Side Label with Integrated Hover Legend */
  .ticker-label {
    background: var(--surface); padding: 0 15px; height: 100%;
    display: flex; flex-direction: column; justify-content: center;
    font-family: var(--syne); font-size: 10px; color: var(--accent);
    border-right: 1px solid var(--border); z-index: 20; text-transform: uppercase;
    cursor: help; position: relative;
  }

  /* Sleek Legend Slide-out */
  .legend-overlay {
    position: absolute; left: 100%; top: 0; height: 100%; 
    background: var(--surface); display: flex; align-items: center;
    gap: 15px; padding: 0 20px; border-right: 1px solid var(--border);
    transform: translateX(-100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 15; pointer-events: none;
  }
  .ticker-label:hover + .legend-overlay { transform: translateX(0); }

  .legend-item { display: flex; align-items: center; font-size: 9px; gap: 6px; white-space: nowrap; color: var(--muted); }
  .dot { width: 8px; height: 8px; border-radius: 50%; }

  .ticker-content {
    display: flex; white-space: nowrap; align-items: center;
    padding-left: 20px; animation: tickerLoop 60s linear infinite;
  }

  .ticker-item { display: inline-flex; align-items: center; margin-right: 60px; font-size: 13px; }

  .impact-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 12px; flex-shrink: 0; }
  .impact-low { background: var(--green); box-shadow: 0 0 8px rgba(74, 222, 128, 0.3); }
  .impact-med { background: var(--orange); box-shadow: 0 0 8px rgba(251, 146, 60, 0.3); }
  .impact-high { background: var(--red); box-shadow: 0 0 12px rgba(248, 113, 113, 0.4); animation: pulseRed 1.5s infinite; }

  .market-tag {
    font-size: 9px; padding: 2px 6px; border-radius: 4px; margin-right: 10px;
    font-weight: 700; background: var(--bg); border: 1px solid var(--border); color: var(--accent);
  }

  .pill-tomorrow { 
    font-size: 9px; padding: 2px 6px; border-radius: 4px; margin-right: 10px;
    color: var(--accent); border: 1px solid var(--accent); font-weight: 700;
  }

  .time-stamp { color: var(--muted); margin-right: 10px; font-size: 11px; font-weight: 500; }

  @keyframes pulseRed { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  @keyframes tickerLoop { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  .ticker-wrap:hover .ticker-content { animation-play-state: paused; }
</style>
</head>
<body>

<div class="ticker-wrap">
  <div class="ticker-label">
    LIVE FEED
    <span style="font-size:7px; opacity:0.6; margin-top:2px;">HOVER LEGEND</span>
  </div>

  <div class="legend-overlay">
    <div class="legend-item"><div class="dot impact-low"></div> LOW</div>
    <div class="legend-item"><div class="dot impact-med"></div> MEDIUM</div>
    <div class="legend-item"><div class="dot impact-high"></div> HIGH</div>
  </div>

  <div class="ticker-content" id="ticker-content">
    <div class="ticker-item">Synchronizing with Global Timezones...</div>
  </div>
</div>

<script>
  const marketMap = [
    { keywords: ['DOW', 'INDUSTRIAL', 'AUTOMOTIVE', 'FORD', 'TESLA', 'BOEING'], tag: 'DOW' },
    { keywords: ['TECH', 'NASDAQ', 'NVIDIA', 'APPLE', 'GOOGLE', 'AI', 'SEMICONDUCTOR'], tag: 'NAS' },
    { keywords: ['S&P', 'SPX', 'EQUITIES'], tag: 'S&P' },
    { keywords: ['GOLD', 'XAU', 'SILVER', 'METAL'], tag: 'CMD' },
    { keywords: ['OIL', 'CRUDE', 'ENERGY', 'OPEC'], tag: 'NRG' },
    { keywords: ['BTC', 'ETH', 'CRYPTO', 'BITCOIN'], tag: 'CRY' },
    { keywords: ['USD', 'FED', 'FOMC', 'POWELL', 'TREASURY'], tag: 'USD' }
  ];

  // Timezone Detection Logic
  function getUserTimezone() {
    try {
      return Intl.DateTimeFormat().resolvedOptions().timeZone.split('/').pop().replace('_', ' ');
    } catch (e) {
      return "EST"; // Default fallback
    }
  }

  async function updateTicker() {
    const tickerContainer = document.getElementById('ticker-content');
    try {
      const response = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.investing.com/rss/news_25.rss');
      const data = await response.json();
      if (data.status === 'ok') render(data.items);
    } catch (e) {
      tickerContainer.innerHTML = '<div class="ticker-item">Fetching data...</div>';
    }
  }

  function render(items) {
    const container = document.getElementById('ticker-content');
    const now = new Date();
    const tomorrow = new Date(); tomorrow.setDate(now.getDate() + 1);
    const tzLabel = getUserTimezone();
    
    let html = '';

    // Sort: Today's items first, then Tomorrow
    items.sort((a, b) => new Date(a.pubDate) - new Date(b.pubDate));

    items.forEach(item => {
      const title = item.title.toUpperCase();
      const d = new Date(item.pubDate);
      
      // Only show Today and Tomorrow (filter out old news)
      if (d.getDate() !== now.getDate() && d.getDate() !== tomorrow.getDate()) return;

      const isTomorrow = d.getDate() === tomorrow.getDate();
      
      const market = marketMap.find(m => m.keywords.some(k => title.includes(k)));
      const tag = market ? `<span class="market-tag">${market.tag}</span>` : '';

      // 12-Hour Time Format
      let hours = d.getHours();
      const ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12;
      hours = hours ? hours : 12;
      const timeStr = `${hours}:${String(d.getMinutes()).padStart(2,'0')} ${ampm} ${tzLabel}`;

      let impactClass = 'impact-low';
      if (/FED|FOMC|CPI|RATE|POWELL|NFP|WAR|EARNINGS/i.test(title)) impactClass = 'impact-high';
      else if (/DATA|REPORT|OUTLOOK|INFLATION|JOBS/i.test(title)) impactClass = 'impact-med';

      html += `
        <div class="ticker-item">
          <div class="impact-dot ${impactClass}"></div>
          ${isTomorrow ? '<span class="pill-tomorrow">TOMORROW</span>' : ''}
          ${tag}
          <span class="time-stamp">${timeStr}</span>
          <span>${item.title}</span>
        </div>
      `;
    });

    container.innerHTML = html + html;
  }

  updateTicker();
  setInterval(updateTicker, 600000);
</script>
</body>
</html>
