<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Elite Catalyst Sidebar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root {
    --bg:#0e0e0f; --surface:#18181b; --border:#2a2a2e;
    --text:#f4f4f5; --muted:#71717a; --accent:#22d3ee;
    --green:#4ade80; --orange:#fb923c; --red:#f87171;
    --mono:'DM Mono',monospace; --syne:'Syne',sans-serif;
  }
  body{background:var(--bg); color:var(--text); font-family:var(--mono); padding:15px; min-height:100vh;}

  .widget-container { width: 100%; max-width: 350px; margin: 0 auto; }

  .header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
  .title { font-family: var(--syne); font-size: 18px; color: var(--text); }
  .subtitle { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }

  /* Feed List */
  .feed-list { display: flex; flex-direction: column; gap: 10px; }
  
  .event-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px; position: relative; overflow: hidden; transition: 0.2s;
  }
  .event-card:hover { border-color: var(--muted); }

  .impact-strip { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
  .high { background: var(--red); box-shadow: 0 0 10px var(--red); }
  .med { background: var(--orange); }
  .low { background: var(--green); }

  .meta-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .time-box { font-size: 10px; font-weight: 500; color: var(--accent); display: flex; align-items: center; gap: 5px; }
  .tz-label { font-size: 8px; color: var(--muted); background: var(--bg); padding: 1px 4px; border-radius: 3px; }
  
  .event-title { font-size: 12px; line-height: 1.4; color: var(--text); margin-bottom: 4px; }
  
  .tag-row { display: flex; gap: 6px; }
  .tag { font-size: 8px; padding: 2px 5px; border-radius: 4px; font-weight: 700; background: var(--bg); border: 1px solid var(--border); }
  .tomorrow-tag { border-color: var(--accent); color: var(--accent); }
  .market-tag { border-color: var(--muted); color: var(--muted); text-transform: uppercase; }

  /* Legend Footer */
  .legend { margin-top: 25px; display: flex; justify-content: space-around; padding-top: 15px; border-top: 1px solid var(--border); }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 8px; color: var(--muted); text-transform: uppercase; }
  .dot { width: 6px; height: 6px; border-radius: 50%; }
</style>
</head>
<body>

<div class="widget-container">
  <div class="header">
    <div>
      <span class="title">Market Catalysts</span><br>
      <span class="subtitle">Live Terminal Feed</span>
    </div>
    <span id="tz-display" class="tz-label">EST</span>
  </div>

  <div id="feed" class="feed-list">
    <div style="text-align:center; padding:40px; color:var(--muted); font-size:11px;">Connecting to data stream...</div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="dot" style="background:var(--green)"></div> Low</div>
    <div class="legend-item"><div class="dot" style="background:var(--orange)"></div> Medium</div>
    <div class="legend-item"><div class="dot" style="background:var(--red)"></div> High</div>
  </div>
</div>

<script>
  const marketMap = [
    { keys: /FED|FOMC|POWELL|USD|TREASURY/, tag: 'USD' },
    { keys: /TECH|NASDAQ|NVDA|AAPL|GOOG|AI/, tag: 'NAS' },
    { keys: /DOW|FORD|BA|GM|INDUSTRIAL/, tag: 'DOW' },
    { keys: /GOLD|XAU|SILVER|METAL/, tag: 'CMD' },
    { keys: /OIL|CRUDE|ENERGY|OPEC/, tag: 'NRG' }
  ];

  const getTZ = () => {
    try { return Intl.DateTimeFormat().resolvedOptions().timeZone.split('/').pop().replace('_', ' '); }
    catch(e) { return "EST"; }
  };

  async function updateFeed() {
    const feed = document.getElementById('feed');
    const tzLabel = getTZ();
    document.getElementById('tz-display').textContent = tzLabel;

    try {
      const res = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.investing.com/rss/news_25.rss');
      const data = await res.json();
      if (data.status === 'ok') render(data.items, tzLabel);
    } catch (e) {
      feed.innerHTML = '<div style="text-align:center; font-size:10px; color:var(--red);">Feed disconnected. Check internet.</div>';
    }
  }

  function render(items, tz) {
    const feed = document.getElementById('feed');
    const now = new Date();
    const tomorrow = new Date(); tomorrow.setDate(now.getDate() + 1);
    
    // Filter and Sort: Today and Tomorrow only
    const events = items
      .filter(item => {
        const d = new Date(item.pubDate);
        return d.getDate() === now.getDate() || d.getDate() === tomorrow.getDate();
      })
      .sort((a,b) => new Date(a.pubDate) - new Date(b.pubDate));

    if (events.length === 0) {
      feed.innerHTML = '<div style="text-align:center; font-size:11px; color:var(--muted); padding:20px;">No catalysts remaining for today/tomorrow.</div>';
      return;
    }

    feed.innerHTML = events.slice(0, 8).map(item => {
      const d = new Date(item.pubDate);
      const title = item.title.toUpperCase();
      const isTom = d.getDate() === tomorrow.getDate();
      
      let impact = 'low';
      if (/FED|FOMC|CPI|RATE|NFP|POWELL/i.test(title)) impact = 'high';
      else if (/DATA|REPORT|JOBS|INFLATION/i.test(title)) impact = 'med';

      let h = d.getHours();
      const m = String(d.getMinutes()).padStart(2,'0');
      const p = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;

      let mktTag = '';
      for (let m of marketMap) { if (m.keys.test(title)) mktTag = `<span class="tag market-tag">${m.tag}</span>`; }

      return `
        <div class="event-card">
          <div class="impact-strip ${impact}"></div>
          <div class="meta-row">
            <div class="time-box">${h}:${m} ${p}</div>
            <div class="tag-row">
              ${isTom ? '<span class="tag tomorrow-tag">TOMORROW</span>' : ''}
              ${mktTag}
            </div>
          </div>
          <div class="event-title">${item.title}</div>
        </div>
      `;
    }).join('');
  }

  updateTicker = updateFeed; // Backwards compat
  updateFeed();
  setInterval(updateFeed, 600000);
</script>
</body>
</html>
