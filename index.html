<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Adaptive Elite Ticker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root {
    --bg:#0e0e0f; --surface:#18181b; --border:#2a2a2e;
    --text:#f4f4f5; --muted:#71717a; --accent:#22d3ee;
    --green:#4ade80; --orange:#fb923c; --red:#f87171;
    --mono:'DM Mono',monospace; --syne:'Syne',sans-serif;
  }
  
  body{background:transparent; color:var(--text); font-family:var(--mono); overflow:hidden;}

  .ticker-wrap {
    width: 100%; background: var(--surface); border: 1px solid var(--border); 
    border-radius: 8px; height: 34px; display: flex; align-items: center; 
    position: relative; overflow: hidden;
  }

  .ticker-label {
    background: var(--surface); padding: 0 12px; height: 100%;
    display: flex; flex-direction: column; justify-content: center;
    font-family: var(--syne); font-size: 9px; color: var(--accent);
    border-right: 1px solid var(--border); z-index: 30; text-transform: uppercase;
    box-shadow: 10px 0 15px rgba(0,0,0,0.5); /* Shadow to separate text */
  }

  /* The smooth scroll engine */
  .ticker-move {
    display: flex; white-space: nowrap;
    animation: tickerSwim 45s linear infinite;
    will-change: transform;
  }

  .ticker-item {
    display: inline-flex; align-items: center;
    margin-right: 50px; font-size: 12px;
  }

  .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 10px; flex-shrink:0; }
  .tag { font-size: 9px; font-weight: 800; margin-right: 10px; color: var(--accent); opacity: 0.8; }
  .time { color: var(--muted); margin-right: 10px; font-size: 10px; }

  @keyframes tickerSwim {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* Desktop/Mobile specific font-size adjustments */
  @media (max-width: 600px) {
    .ticker-item { font-size: 11px; margin-right: 30px; }
    .ticker-label { font-size: 8px; padding: 0 8px; }
    .ticker-move { animation-duration: 25s; } /* Faster on small screens to see more news */
  }
</style>
</head>
<body>

<div class="ticker-wrap">
  <div class="ticker-label">
    LIVE<span>FEED</span>
  </div>

  <div class="ticker-move" id="track">
    <div class="ticker-item">Initialising terminal stream...</div>
  </div>
</div>

<script>
  const tz = () => {
    try { return Intl.DateTimeFormat().resolvedOptions().timeZone.split('/').pop().replace('_', ' '); }
    catch(e) { return "EST"; }
  };

  async function getNews() {
    try {
      const res = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.investing.com/rss/news_25.rss');
      const data = await res.json();
      if (data.status === 'ok') build(data.items);
    } catch (e) { document.getElementById('track').innerHTML = '<div class="ticker-item">Connection lag... retrying</div>'; }
  }

  function build(items) {
    const track = document.getElementById('track');
    const now = new Date();
    const tomorrow = new Date(); tomorrow.setDate(now.getDate() + 1);
    const zone = tz();

    // Market keywords
    const keys = { 'DOW': /DOW|FORD|BA|TESLA/, 'NAS': /TECH|NVDA|AAPL|GOOG|AI/, 'USD': /FED|FOMC|CPI|POWELL|RATE/ };

    let content = '';
    
    // Sort oldest to newest to ensure Today is first
    const sorted = items.sort((a,b) => new Date(a.pubDate) - new Date(b.pubDate));

    sorted.forEach(item => {
      const d = new Date(item.pubDate);
      if (d.getDate() !== now.getDate() && d.getDate() !== tomorrow.getDate()) return;

      const isTom = d.getDate() === tomorrow.getDate();
      const title = item.title.toUpperCase();
      
      // Impact logic
      let dot = '#4ade80'; // Low
      if (/FED|FOMC|CPI|NFP|WAR/i.test(title)) dot = '#f87171'; // High
      else if (/REPORT|INFLATION|JOBS/i.test(title)) dot = '#fb923c'; // Med

      // Market Tag
      let tag = '';
      for (let k in keys) { if (keys[k].test(title)) tag = `<span class="tag">[${k}]</span>`; }

      // Time 12h
      let h = d.getHours();
      const m = String(d.getMinutes()).padStart(2,'0');
      const p = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;

      content += `
        <div class="ticker-item">
          <div class="dot" style="background:${dot}; box-shadow: 0 0 8px ${dot}66"></div>
          ${isTom ? '<span class="tag" style="color:var(--accent)">TOMORROW</span>' : ''}
          ${tag}
          <span class="time">${h}:${m} ${p} ${zone}</span>
          <span>${item.title}</span>
        </div>
      `;
    });

    // Double the content for a seamless loop
    track.innerHTML = content + content;
  }

  getNews();
  setInterval(getNews, 600000);
</script>
</body>
</html>
