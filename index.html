<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Elite News Ticker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root {
    --bg:#0e0e0f; --surface:#18181b; --border:#2a2a2e;
    --text:#f4f4f5; --muted:#71717a; --accent:#22d3ee;
    --red:#f87171; --mono:'DM Mono',monospace; --syne:'Syne',sans-serif;
  }
  body{background:var(--bg); color:var(--text); font-family:var(--mono); padding:10px; overflow:hidden;}

  .ticker-wrap {
    width: 100%; background: var(--surface); 
    border: 1px solid var(--border); border-radius: 12px;
    height: 50px; display: flex; align-items: center;
    position: relative; overflow: hidden;
  }

  /* Static Label */
  .ticker-label {
    background: var(--surface); padding: 0 15px; height: 100%;
    display: flex; align-items: center; font-family: var(--syne);
    font-size: 11px; color: var(--accent); letter-spacing: 0.1em;
    border-right: 1px solid var(--border); z-index: 10;
    text-transform: uppercase;
  }

  /* The Moving Ticker */
  .ticker-content {
    display: flex; white-space: nowrap; align-items: center;
    padding-left: 20px; animation: tickerLoop 40s linear infinite;
  }

  .ticker-item {
    display: inline-flex; align-items: center;
    margin-right: 50px; font-size: 12px; color: var(--text);
  }

  .ticker-time { color: var(--muted); margin-right: 10px; font-size: 10px; }
  .ticker-tag { 
    background: rgba(248, 113, 113, 0.1); color: var(--red);
    font-size: 9px; padding: 2px 6px; border-radius: 4px;
    margin-right: 10px; font-weight: 700; border: 1px solid rgba(248, 113, 113, 0.2);
  }

  @keyframes tickerLoop {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
  }

  .ticker-wrap:hover .ticker-content { animation-play-state: paused; }

  /* Pulse for "Live" effect */
  .live-dot {
    width: 6px; height: 6px; background: var(--red);
    border-radius: 50%; margin-right: 8px;
    animation: pulseRed 1.5s infinite;
  }
  @keyframes pulseRed { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
</style>
</head>
<body>

<div class="ticker-wrap">
  <div class="ticker-label">
    <div class="live-dot"></div>
    Market News
  </div>
  <div class="ticker-content" id="ticker-content">
    <div class="ticker-item">Fetching latest market catalysts...</div>
  </div>
</div>

<script>
  async function fetchNews() {
    const tickerContainer = document.getElementById('ticker-content');
    
    try {
      // Using a reliable RSS to JSON bridge for financial news (ForexLive/MarketWatch style)
      const response = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.marketwatch.com/rss/marketupdate');
      const data = await response.json();

      if (data.items && data.items.length > 0) {
        tickerContainer.innerHTML = '';
        
        // Loop through news items
        data.items.forEach(item => {
          const time = new Date(item.pubDate).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          const isHighImpact = item.title.toUpperCase().includes('FED') || 
                               item.title.toUpperCase().includes('CPI') || 
                               item.title.toUpperCase().includes('RATE');

          const div = document.createElement('div');
          div.className = 'ticker-item';
          div.innerHTML = `
            <span class="ticker-time">${time}</span>
            ${isHighImpact ? '<span class="ticker-tag">HIGH IMPACT</span>' : ''}
            <span class="ticker-text">${item.title}</span>
          `;
          tickerContainer.appendChild(div);
        });

        // Duplicate items for seamless infinite loop
        const clone = tickerContainer.innerHTML;
        tickerContainer.innerHTML += clone;
      }
    } catch (error) {
      tickerContainer.innerHTML = '<div class="ticker-item">Connection lost. Retrying...</div>';
    }
  }

  // Initial Fetch
  fetchNews();
  // Refresh every 5 minutes
  setInterval(fetchNews, 300000);
</script>

</body>
</html>
