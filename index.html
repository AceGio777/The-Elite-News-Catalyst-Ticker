<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Elite Catalyst Ticker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root {
    --bg:#0e0e0f; --surface:#18181b; --border:#2a2a2e;
    --text:#f4f4f5; --muted:#71717a; --accent:#22d3ee;
    --red:#ff4747; --amber:#fbbf24; --mono:'DM Mono',monospace; --syne:'Syne',sans-serif;
  }
  body{background:var(--bg); color:var(--text); font-family:var(--mono); padding:10px; overflow:hidden;}

  .ticker-wrap {
    width: 100%; background: var(--surface); 
    border: 1px solid var(--border); border-radius: 12px;
    height: 54px; display: flex; align-items: center;
    position: relative; overflow: hidden;
  }

  .ticker-label {
    background: var(--surface); padding: 0 18px; height: 100%;
    display: flex; align-items: center; font-family: var(--syne);
    font-size: 11px; color: var(--accent); letter-spacing: 0.12em;
    border-right: 1px solid var(--border); z-index: 10;
    text-transform: uppercase; white-space: nowrap;
  }

  .ticker-content {
    display: flex; white-space: nowrap; align-items: center;
    padding-left: 20px; animation: tickerLoop 60s linear infinite;
  }

  .ticker-item {
    display: inline-flex; align-items: center;
    margin-right: 60px; font-size: 13px; color: var(--text);
  }

  /* Status Pills */
  .pill {
    font-size: 9px; padding: 2px 8px; border-radius: 4px;
    margin-right: 10px; font-weight: 700; text-transform: uppercase;
    border: 1px solid transparent;
  }
  .pill-tomorrow { 
    background: rgba(34, 211, 238, 0.1); color: var(--accent);
    border-color: rgba(34, 211, 238, 0.3);
    box-shadow: 0 0 10px rgba(34, 211, 238, 0.2);
  }
  .pill-critical { 
    background: rgba(255, 71, 71, 0.15); color: var(--red);
    border-color: var(--red);
    animation: criticalPulse 2s infinite;
  }

  @keyframes criticalPulse {
    0% { box-shadow: 0 0 0px var(--red); }
    50% { box-shadow: 0 0 12px var(--red); }
    100% { box-shadow: 0 0 0px var(--red); }
  }

  @keyframes tickerLoop {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); } /* Halfway because we duplicate content */
  }

  .ticker-wrap:hover .ticker-content { animation-play-state: paused; }

  .live-dot {
    width: 6px; height: 6px; background: var(--accent);
    border-radius: 50%; margin-right: 10px;
    box-shadow: 0 0 8px var(--accent);
  }
</style>
</head>
<body>

<div class="ticker-wrap">
  <div class="ticker-label">
    <div class="live-dot"></div>
    Elite Catalyst
  </div>
  <div class="ticker-content" id="ticker-content">
    <div class="ticker-item">Synchronizing with global economic calendar...</div>
  </div>
</div>

<script>
  // Since real-time API keys for Forex calendars are expensive, 
  // we use a logic-based fallback that parses the current feed 
  // and distinguishes between "Today" and "Tomorrow" events.

  async function updateTicker() {
    const tickerContainer = document.getElementById('ticker-content');
    
    try {
      // Fetching from a reliable financial feed
      const response = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.dailyfx.com/feeds/market-news');
      const data = await response.json();

      if (data.items && data.items.length > 0) {
        let htmlContent = '';
        const now = new Date();
        const tomorrowDate = new Date();
        tomorrowDate.setDate(now.getDate() + 1);

        data.items.slice(0, 15).forEach(item => {
          const pubDate = new Date(item.pubDate);
          const isTomorrow = pubDate.getDate() === tomorrowDate.getDate();
          
          // Keywords for "VERY IMPORTANT" news
          const criticalKeywords = ['CPI', 'FED', 'FOMC', 'RATE', 'NON-FARM', 'NFP', 'POWELL', 'ECB', 'INFLATION'];
          const isCritical = criticalKeywords.some(k => item.title.toUpperCase().includes(k));

          const timeStr = pubDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

          htmlContent += `
            <div class="ticker-item">
              ${isTomorrow ? '<span class="pill pill-tomorrow">Tomorrow</span>' : ''}
              ${isCritical ? '<span class="pill pill-critical">VERY IMPORTANT</span>' : ''}
              <span style="color:var(--muted); margin-right:10px;">${timeStr}</span>
              <span>${item.title}</span>
            </div>
          `;
        });

        // Duplicate for seamless scroll
        tickerContainer.innerHTML = htmlContent + htmlContent;
      }
    } catch (err) {
      tickerContainer.innerHTML = '<div class="ticker-item">Awaiting Market Data...</div>';
    }
  }

  updateTicker();
  setInterval(updateTicker, 600000); // Refresh every 10 mins
</script>

</body>
</html>
