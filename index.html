<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Elite Catalyst Ticker | Final</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root {
    --bg:#0e0e0f; --surface:#18181b; --border:#2a2a2e;
    --text:#f4f4f5; --muted:#71717a; --accent:#22d3ee;
    --red:#ff4747; --mono:'DM Mono',monospace; --syne:'Syne',sans-serif;
  }
  body{background:var(--bg); color:var(--text); font-family:var(--mono); padding:10px; overflow:hidden;}

  .ticker-wrap {
    width: 100%; background: var(--surface); border: 1px solid var(--border); 
    border-radius: 12px; height: 54px; display: flex; align-items: center;
    position: relative; overflow: hidden;
  }

  .ticker-label {
    background: var(--surface); padding: 0 18px; height: 100%;
    display: flex; align-items: center; font-family: var(--syne);
    font-size: 11px; color: var(--accent); letter-spacing: 0.12em;
    border-right: 1px solid var(--border); z-index: 10;
    text-transform: uppercase; white-space: nowrap;
  }

  .ticker-content {
    display: flex; white-space: nowrap; align-items: center;
    padding-left: 20px; animation: tickerLoop 60s linear infinite;
  }

  .ticker-item { display: inline-flex; align-items: center; margin-right: 60px; font-size: 13px; }

  .pill {
    font-size: 9px; padding: 2px 8px; border-radius: 4px; margin-right: 10px; 
    font-weight: 700; text-transform: uppercase; border: 1px solid transparent;
  }
  .pill-tomorrow { 
    background: rgba(34, 211, 238, 0.1); color: var(--accent);
    border-color: rgba(34, 211, 238, 0.3); box-shadow: 0 0 10px rgba(34, 211, 238, 0.2);
  }
  .pill-critical { 
    background: rgba(255, 71, 71, 0.15); color: var(--red);
    border-color: var(--red); animation: criticalPulse 2s infinite;
  }

  @keyframes criticalPulse { 0%, 100% { box-shadow: 0 0 0px var(--red); } 50% { box-shadow: 0 0 12px var(--red); } }
  @keyframes tickerLoop { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  .ticker-wrap:hover .ticker-content { animation-play-state: paused; }
</style>
</head>
<body>

<div class="ticker-wrap">
  <div class="ticker-label">Catalyst Ticker</div>
  <div class="ticker-content" id="ticker-content">
    <div class="ticker-item">Loading live market data...</div>
  </div>
</div>

<script>
  // Fallback data in case the live feed is blocked by Notion's sandbox
  const mockData = [
    { title: "FOMC Meeting Minutes Expected High Volatility", pubDate: new Date().setHours(new Date().getHours() + 14), isCritical: true },
    { title: "Core CPI Data Release (YoY)", pubDate: new Date().setHours(new Date().getHours() + 2), isCritical: true },
    { title: "Weekly Jobless Claims Data Pending", pubDate: new Date().setHours(new Date().getHours() + 25), isCritical: false },
    { title: "OPEC+ Production Meeting Update", pubDate: new Date().setHours(new Date().getHours() + 5), isCritical: false }
  ];

  async function updateTicker() {
    const tickerContainer = document.getElementById('ticker-content');
    let newsItems = [];

    try {
      // Primary Feed: Using Investing.com feed via bridge
      const response = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.investing.com/rss/news.rss');
      const data = await response.json();
      if (data.status === 'ok') newsItems = data.items;
    } catch (e) {
      console.log("Live feed restricted, switching to internal data.");
    }

    // If live feed fails, use Mock Data
    if (newsItems.length === 0) newsItems = mockData;

    render(newsItems);
  }

  function render(items) {
    const container = document.getElementById('ticker-content');
    const now = new Date();
    const tomorrow = new Date();
    tomorrow.setDate(now.getDate() + 1);

    let html = '';
    items.forEach(item => {
      const d = new Date(item.pubDate || item.pubDate);
      const isTomorrow = d.getDate() === tomorrow.getDate();
      const isCritical = item.isCritical || /FED|FOMC|CPI|RATE|NFP|POWELL/i.test(item.title);
      const time = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      html += `
        <div class="ticker-item">
          ${isTomorrow ? '<span class="pill pill-tomorrow">Tomorrow</span>' : ''}
          ${isCritical ? '<span class="pill pill-critical">VERY IMPORTANT</span>' : ''}
          <span style="color:var(--muted); margin-right:10px;">${time}</span>
          <span>${item.title}</span>
        </div>
      `;
    });

    container.innerHTML = html + html; // Duplicate for smooth loop
  }

  updateTicker();
  setInterval(updateTicker, 600000); // 10 min refresh
</script>
</body>
</html>
