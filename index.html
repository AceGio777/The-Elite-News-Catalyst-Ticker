<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Elite Market-Aware Ticker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root {
    --bg:#0e0e0f; --surface:#18181b; --border:#2a2a2e;
    --text:#f4f4f5; --muted:#71717a; --accent:#22d3ee;
    --green:#4ade80; --orange:#fb923c; --red:#f87171;
    --mono:'DM Mono',monospace; --syne:'Syne',sans-serif;
  }
  body{background:var(--bg); color:var(--text); font-family:var(--mono); padding:10px; overflow:hidden;}

  .ticker-wrap {
    width: 100%; background: var(--surface); border: 1px solid var(--border); 
    border-radius: 12px; height: 54px; display: flex; align-items: center;
    position: relative; overflow: hidden;
  }

  .ticker-label {
    background: var(--surface); padding: 0 15px; height: 100%;
    display: flex; flex-direction: column; justify-content: center;
    font-family: var(--syne); font-size: 10px; color: var(--accent);
    border-right: 1px solid var(--border); z-index: 10; text-transform: uppercase;
  }

  .legend-trigger {
    font-size: 8px; color: var(--muted); cursor: pointer; margin-top: 2px; text-decoration: underline;
  }

  .ticker-content {
    display: flex; white-space: nowrap; align-items: center;
    padding-left: 20px; animation: tickerLoop 60s linear infinite;
  }

  .ticker-item { display: inline-flex; align-items: center; margin-right: 60px; font-size: 13px; }

  /* Impact Bubbles */
  .impact-dot {
    width: 10px; height: 10px; border-radius: 50%; margin-right: 12px; flex-shrink: 0;
    box-shadow: 0 0 8px rgba(255,255,255,0.1);
  }
  .impact-low { background: var(--green); box-shadow: 0 0 10px rgba(74, 222, 128, 0.4); }
  .impact-med { background: var(--orange); box-shadow: 0 0 10px rgba(251, 146, 60, 0.4); }
  .impact-high { background: var(--red); box-shadow: 0 0 10px rgba(248, 113, 113, 0.4); animation: pulseRed 1.5s infinite; }

  /* Market Tags */
  .market-tag {
    font-size: 9px; padding: 2px 6px; border-radius: 4px; margin-right: 10px;
    font-weight: 700; background: var(--bg); border: 1px solid var(--border); color: var(--accent);
  }

  .pill-tomorrow { 
    font-size: 9px; padding: 2px 6px; border-radius: 4px; margin-right: 10px;
    color: var(--accent); border: 1px solid var(--accent); font-weight: 700;
    box-shadow: 0 0 8px rgba(34, 211, 238, 0.2);
  }

  @keyframes pulseRed { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  @keyframes tickerLoop { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  .ticker-wrap:hover .ticker-content { animation-play-state: paused; }

  /* Legend Modal */
  #legend-modal {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 15px; z-index: 1000; display: none; width: 180px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  .legend-item { display: flex; align-items: center; font-size: 10px; margin-bottom: 8px; gap: 10px; color: var(--muted); }
</style>
</head>
<body>

<div id="legend-modal" onclick="this.style.display='none'">
  <div class="legend-item"><div class="impact-dot impact-low"></div> Low Impact</div>
  <div class="legend-item"><div class="impact-dot impact-med"></div> Medium Impact</div>
  <div class="legend-item"><div class="impact-dot impact-high"></div> High Impact</div>
  <div style="font-size: 8px; text-align: center; margin-top: 5px;">(Click to Close)</div>
</div>

<div class="ticker-wrap">
  <div class="ticker-label">
    Live Feed
    <div class="legend-trigger" onclick="document.getElementById('legend-modal').style.display='block'">Legend</div>
  </div>
  <div class="ticker-content" id="ticker-content">
    <div class="ticker-item">Parsing global catalysts...</div>
  </div>
</div>

<script>
  // Market Mapping Logic
  const marketMap = [
    { keywords: ['DOW', 'DOW JONES', 'INDUSTRIAL', 'AUTOMOTIVE', 'FORD', 'TESLA', 'BOEING'], tag: 'DOW' },
    { keywords: ['TECH', 'NASDAQ', 'NVIDIA', 'APPLE', 'GOOGLE', 'AI', 'SEMICONDUCTOR'], tag: 'NAS' },
    { keywords: ['S&P', 'SPX', 'EQUITIES', 'MARKET-WIDE'], tag: 'S&P' },
    { keywords: ['GOLD', 'XAU', 'SILVER', 'METAL', 'PRECIOUS'], tag: 'CMD' },
    { keywords: ['OIL', 'CRUDE', 'ENERGY', 'OPEC', 'WTI'], tag: 'NRG' },
    { keywords: ['BTC', 'ETH', 'CRYPTO', 'BITCOIN', 'COINBASE'], tag: 'CRY' },
    { keywords: ['USD', 'FED', 'FOMC', 'POWELL', 'TREASURY', 'DOLLAR'], tag: 'USD' }
  ];

  async function updateTicker() {
    const tickerContainer = document.getElementById('ticker-content');
    try {
      const response = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.investing.com/rss/news_25.rss');
      const data = await response.json();
      if (data.status === 'ok') render(data.items);
    } catch (e) {
      tickerContainer.innerHTML = '<div class="ticker-item">Searching for data stream...</div>';
    }
  }

  function render(items) {
    const container = document.getElementById('ticker-content');
    const tomorrow = new Date(); tomorrow.setDate(new Date().getDate() + 1);
    let html = '';

    items.forEach(item => {
      const title = item.title.toUpperCase();
      const d = new Date(item.pubDate);
      const isTomorrow = d.getDate() === tomorrow.getDate();
      
      // Determine Market Tag
      const market = marketMap.find(m => m.keywords.some(k => title.includes(k)));
      const tag = market ? `<span class="market-tag">${market.tag}</span>` : '';

      // Determine Impact Bubble
      let impactClass = 'impact-low';
      if (/FED|FOMC|CPI|RATE|POWELL|NFP|WAR|EARNINGS/i.test(title)) impactClass = 'impact-high';
      else if (/DATA|REPORT|OUTLOOK|INFLATION|JOBS/i.test(title)) impactClass = 'impact-med';

      html += `
        <div class="ticker-item">
          <div class="impact-dot ${impactClass}"></div>
          ${isTomorrow ? '<span class="pill-tomorrow">TOMORROW</span>' : ''}
          ${tag}
          <span style="color:var(--muted); margin-right:10px;">${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}</span>
          <span>${item.title}</span>
        </div>
      `;
    });

    container.innerHTML = html + html;
  }

  updateTicker();
  setInterval(updateTicker, 600000);
</script>
</body>
</html>
